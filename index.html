<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">

<meta name="mobile-web-app-capable" content="yes">

<style>

/* CONFIGURAÇÃO GERAL */

html, body {

margin:0;
padding:0;
height:100%;
background:#0B1218;

/* permite rolar a página */

overflow-y:auto;

}

/* espaço para evitar que o curativo cubra botões */

body{

padding-bottom:120px;

}

/* container principal */

.app-container{

width:100%;
height:100%;
position:relative;

background:#0B1218;

}

/* aplicativo do Base44 */

iframe{

width:100%;
height:calc(100vh - 80px);
border:none;

}

/* sua logo */

.minha-logo{

position:fixed;

top:15px;
left:15px;

width:50px;
height:auto;

z-index:10000;

pointer-events:none;

}

/* CURATIVO INTELIGENTE (apenas no canto da marca) */

.curativo{

position:fixed;

bottom:15px;
right:15px;

width:260px;
height:90px;

background:#0B1218;

border-radius:10px;

z-index:9999;

pointer-events:none;

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<div class="curativo"></div>

<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

</div>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B1218">

<style>

/* ===== ESTRUTURA DA PÁGINA ===== */

html,body{
margin:0;
padding:0;
height:100%;
background:#0B1218;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* ===== CONTAINER PRINCIPAL ===== */

.app-container{
width:100%;
height:100vh;
position:relative;
}

/* ===== APP BASE44 ===== */

iframe{
width:100%;
height:100%;
border:none;
display:block;
}

/* ===== LOGO SUPERIOR ===== */

.minha-logo{
position:fixed;
top:15px;
left:15px;
width:50px;
z-index:10000;
pointer-events:none;
}

/* ===== CURATIVO (COBRE A MARCA) ===== */

.curativo{

position:fixed;

bottom:0;
right:0;

/* ajuste tamanho aqui */

width:380px;
height:140px;

background:#0B1218;

/* canto arredondado */

border-top-left-radius:40px;

z-index:9999;

pointer-events:none;

}

/* ===== LOGO SOBRE O CURATIVO ===== */

.logo-curativo{

position:fixed;

/* ajuste posição aqui */

bottom:30px;
right:35px;

/* tamanho da logo */

width:60px;

z-index:10001;

pointer-events:none;

}

/* ===== AJUSTE AUTOMÁTICO MOBILE ===== */

@media (max-width:768px){

.curativo{
width:240px;
height:100px;
}

.logo-curativo{
width:42px;
bottom:22px;
right:22px;
}

}

</style>

</head>

<body>

<div class="app-container">

<!-- logo superior -->
<img src="logo.png" class="minha-logo">

<!-- aplicativo -->
<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

<!-- curativo -->
<div class="curativo"></div>

<!-- logo sobre o curativo -->
<img src="logo.png" class="logo-curativo">

</div>

</body>

</html>

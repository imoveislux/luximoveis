<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

/* estrutura */

html,body{
margin:0;
padding:0;
height:100%;
background:#0B1218;
overflow:hidden;
}

/* container */

.app-container{
width:100%;
height:100vh;
position:relative;
}

/* app */

iframe{
width:100%;
height:100%;
border:none;
display:block;
}

/* logo superior */

.minha-logo{
position:fixed;
top:15px;
left:15px;
width:50px;
z-index:10000;
pointer-events:none;
}

/* CURATIVO */

.curativo{

position:fixed;

bottom:0;
right:0;

width:380px;
height:140px;

background:#0B1218;

/* arredondamento */

border-top-left-radius:40px;

z-index:999999;

pointer-events:none;

}

/* LOGO NO CURATIVO */

.logo-curativo{

position:fixed;

bottom:35px;
right:150px;

width:60px;

z-index:999999;

pointer-events:none;

}

/* MOBILE */

@media (max-width:768px){

.curativo{
width:240px;
height:100px;
}

.logo-curativo{
width:40px;
bottom:25px;
right:90px;
}

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

<div class="curativo"></div>

<img src="logo.png" class="logo-curativo">

</div>

</body>

</html>

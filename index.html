<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

/* estrutura base */

html,body{
margin:0;
padding:0;
height:100%;
background:#0B1218;
overflow:hidden;
}

/* container */

.app-container{
width:100%;
height:100vh;
position:relative;
}

/* aplicativo */

iframe{
width:100%;
height:100%;
border:none;
display:block;
}

/* LOGO SUPERIOR */

.minha-logo{

position:fixed;

top:15px;
left:15px;

width:50px;

z-index:10000;

pointer-events:none;

}

/* CURATIVO */

.curativo{

position:fixed;

bottom:20px;
right:20px;

width:220px;
height:80px;

background:#e0e4e8;

border-radius:25px;

z-index:9999;

display:flex;
align-items:center;
justify-content:center;

box-shadow:0 0 10px rgba(0,0,0,0.5);

pointer-events:none;

}

/* LOGO NO CURATIVO */

.logo-curativo{

width:50px;
height:auto;

}

/* MOBILE */

@media (max-width:768px){

.curativo{

width:160px;
height:65px;

bottom:10px;
right:10px;

}

.logo-curativo{

width:28px;

}

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

<div class="curativo">

<img src="logo.png" class="logo-curativo">

</div>

</div>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">

<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B1218">

<style>

/* reset */

html,body{
margin:0;
padding:0;
background:#0B1218;
overflow-y:auto;
}

/* container */

.app-container{
width:100%;
position:relative;
}

/* iframe do app */

iframe{

width:100%;
height:200vh; /* permite rolar o app */

border:none;
display:block;

}

/* logo */

.minha-logo{

position:fixed;

top:15px;
left:15px;

width:50px;

z-index:10000;

pointer-events:none;

}

/* curativo principal */

.curativo{

position:fixed;

bottom:0;
right:0;

width:340px;
height:120px;

background:#0B1218;

z-index:9999;

pointer-events:none;

}

/* ajuste automático mobile */

@media (max-width:768px){

.curativo{

width:230px;
height:90px;

}

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

<div class="curativo"></div>

</div>

</body>

</html>

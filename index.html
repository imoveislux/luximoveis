<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Imóveis & Investimentos Imobiliários</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

/* estrutura base */

html,body{
margin:0;
padding:0;
height:100%;
background:#0B1218;
overflow-y:auto;
}

/* SCROLL DESKTOP */

body{
padding-bottom:0px;
}

/* container */

.app-container{
width:100%;
height:100vh;
position:relative;
}

/* aplicativo */

iframe{
width:100%;
height:100%;
border:none;
display:block;
}

/* LOGO SUPERIOR */

.minha-logo{

position:fixed;

top:15px;
left:15px;

width:50px;

z-index:10000;

pointer-events:none;

}

/* CURATIVO */

.curativo{
position:fixed;
bottom:0;
right:0;

width:100vw;   /* cobre largura toda */
height:120px;  /* altura da área inferior */

background:#0B1218;

z-index:999999;

pointer-events:none;
}

/* ESCUDO (bloqueia clique) */

.escudo{

position:fixed;

bottom:7px;
right:7px;

width:280px;
height:80px;

background:transparent;

z-index:10001;

pointer-events:auto;

}

/* LOGO NO CURATIVO */

.logo-curativo{

width:90px;
height:auto;

}

/* MOBILE */

@media (max-width:768px){

.curativo{

width:220px;
height:42px;

bottom:15px;
right:9px;

}

.escudo{

width:220px;
height:42px;

bottom:15px;
right:9px;

}

body{
padding-bottom:0px;
}

.logo-curativo{
width:60px;
}

}

</style>

</head>

<body>

<div class="app-container">

<img src="logo.png" class="minha-logo">

<iframe src="https://imoveis-investimentos-imoveis-d09a2daa.base44.app"></iframe>

<div class="curativo">
<img src="logo.png" class="logo-curativo">
</div>

<div class="escudo"></div>

</div>

</body>

</html>
